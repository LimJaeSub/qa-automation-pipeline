# CI/CD 파이프라인 설정 파일 (GitHub Actions)
name: QA Automation Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
# main 브랜치에 푸쉬 or 풀 리퀘스트 시 파이프라인 실행

permissions:
  contents: write
  pages: write
  id-token: write
# 필요한 권한 설정 (코드 콘텐츠, GitHub Pages, ID 토큰)

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3
        # Github 서버에서 현재 repo를 다운로드

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
        # CI 환경에서 Python 3.11 버전 설치

      - name: 패키지 설치
        run: pip install -r requirements.txt
        # 필요 라이브러리 설치

      - name: Chrome 설치
        uses: browser-actions/setup-chrome@v1
        # Chrome 설치

      - name: 테스트 실행
        run: pytest
        # 테스트할 경로 설정

      - name: Allure 리포트 생성
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20
        # Allure 리포트 생성 및 보존 (최대 20개) / raw 데이터를 html로 변환

      - name: GitHub Pages 배포
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
        # Allure 리포트를 GitHub Pages로 배포 (gh-pages 브랜치)